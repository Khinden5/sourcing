<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sourcing — Katelyn</title>
<style>
  :root{--ink:#241f1a;--muted:#6b6157;--line:#e5ddd2;--paper:#fbf8f3;--card:#fff;
    --brand:#b5533a;--brand-dark:#8f3f2c;--brand-soft:#f3e2da;--chip:#f0eae0;--warn:#c9a227}
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:14px}
  a{color:var(--brand)}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:13px}
  .topbar{position:sticky;top:0;z-index:50;background:linear-gradient(160deg,#b5533a,#8f3f2c);color:#fff;
    display:flex;align-items:center;gap:14px;padding:10px 18px;flex-wrap:wrap}
  .topbar .logo{font-weight:800;font-size:17px}
  .topbar .logo span{opacity:.7;font-weight:400}
  .tabs{display:flex;gap:4px}
  .tab{background:transparent;border:none;color:#fff;opacity:.75;font-size:14px;font-weight:600;padding:7px 13px;border-radius:8px}
  .tab:hover{opacity:1}.tab.active{background:rgba(255,255,255,.18);opacity:1}
  .topbar .spacer{flex:1}
  .topbar .count{font-size:12px;opacity:.85}
  .shell{display:flex;min-height:calc(100vh - 49px)}
  .rail{width:252px;flex-shrink:0;border-right:1px solid var(--line);background:var(--card);
    padding:16px 14px 40px;overflow-y:auto;max-height:calc(100vh - 49px);position:sticky;top:49px}
  .rail h4{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 6px}
  .rail h4:first-child{margin-top:0}
  .search{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--paper)}
  .deptlink{display:flex;justify-content:space-between;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:13px}
  .deptlink:hover{background:var(--chip)}
  .deptlink.on{background:var(--brand);color:#fff}
  .deptlink .n{color:var(--muted);font-size:11.5px}
  .deptlink.on .n{color:rgba(255,255,255,.75)}
  .fchip{display:inline-block;background:var(--chip);border:1px solid transparent;color:var(--ink);
    font-size:12px;padding:3px 10px;border-radius:20px;margin:2px 3px 2px 0;cursor:pointer;user-select:none}
  .fchip:hover{border-color:var(--brand)}
  .fchip.on{background:var(--brand);color:#fff}
  .fchip .n{opacity:.55;font-size:10.5px;margin-left:3px}
  .clearbtn{background:none;border:none;color:var(--brand);font-size:12px;padding:0;margin-top:10px;text-decoration:underline}
  .pricerow{display:flex;gap:6px}
  .pricerow input{width:50%;padding:6px 8px;border:1px solid var(--line);border-radius:8px}
  .main{flex:1;padding:18px 22px 90px;min-width:0}
  .toolrow{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolrow .res{font-size:13px;color:var(--muted)}
  .toolrow select{padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .crumb{font-size:13px;color:var(--muted);margin-bottom:4px}
  .crumb a{cursor:pointer;text-decoration:none}
  .crumb a:hover{text-decoration:underline}
  h1.pagetitle{font-size:24px;margin:0 0 4px;letter-spacing:-.01em}
  .subrow{margin:8px 0 16px}
  .dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-top:10px}
  .dtile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 14px;cursor:pointer;transition:box-shadow .12s}
  .dtile:hover{box-shadow:0 4px 16px rgba(36,31,26,.1);border-color:var(--brand)}
  .dtile h3{margin:0 0 2px;font-size:16.5px}
  .dtile .dn{color:var(--muted);font-size:12.5px;margin-bottom:8px}
  .dtile .subs{font-size:11.5px;color:var(--muted);line-height:1.7}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .12s}
  .pcard:hover{box-shadow:0 4px 16px rgba(36,31,26,.1)}
  .pimg{aspect-ratio:1/1;background:var(--chip);width:100%;object-fit:cover;display:block}
  .pbody{padding:10px 12px 12px;display:flex;flex-direction:column;gap:3px;flex:1}
  .ptitle{font-weight:600;font-size:13.5px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pvendor{font-size:11.5px;color:var(--muted)}
  .pprice{font-weight:700;font-size:14px;margin-top:2px}
  .soldout{color:#b03030;font-size:11px;font-weight:600}
  .pfoot{display:flex;gap:6px;margin-top:auto;padding-top:8px}
  .mini{font-size:11.5px;padding:4px 9px;border-radius:7px;border:1px solid var(--line);background:#fff;text-decoration:none;color:var(--ink)}
  .mini:hover{border-color:var(--brand);color:var(--brand)}
  .mini.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .mini.primary:hover{background:var(--brand-dark)}
  .vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
  .vcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;display:flex;flex-direction:column;gap:6px}
  .vcard .vname{font-weight:700;font-size:14.5px}
  .vcard .vloc{font-size:12px;color:var(--muted)}
  .tag{display:inline-block;background:var(--chip);color:var(--muted);font-size:10.5px;padding:1px 8px;border-radius:20px;margin:1px 3px 1px 0}
  .tag.price{background:var(--brand-soft);color:var(--brand-dark);font-weight:600}
  .tag.count{background:#e7ece2;color:#55613f;font-weight:600}
  .tradebox{background:#fdf6ec;border-left:2px solid var(--warn);border-radius:6px;padding:6px 9px;font-size:12px;margin-top:4px}
  .boardbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .boardsel{padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:14px;font-weight:600;max-width:280px}
  .btn{padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:600}
  .btn:hover{border-color:var(--brand);color:var(--brand)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-dark);color:#fff}
  .btn.danger:hover{border-color:#b03030;color:#b03030}
  .budgetbox{margin-left:auto;text-align:right;font-size:13px}
  .budgetbox .big{font-size:19px;font-weight:800}
  .budgetbox .over{color:#b03030}
  .bitem{display:flex;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:10px}
  .bitem img{width:64px;height:64px;object-fit:cover;border-radius:8px;background:var(--chip)}
  .bitem .binfo{flex:1;min-width:0}
  .bitem .bname{font-weight:700;font-size:13.5px}
  .bitem .bvendor{font-size:12px;color:var(--muted)}
  .bitem input.priceIn{width:90px;padding:5px 7px;border:1px solid var(--line);border-radius:7px;text-align:right}
  .bitem input.roomIn{width:105px;padding:5px 7px;border:1px solid var(--line);border-radius:7px}
  .status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;border:none}
  .status.Considering{background:var(--chip);color:var(--muted)}
  .status.Specified{background:var(--brand-soft);color:var(--brand-dark)}
  .status.Ordered{background:#e7ece2;color:#55613f}
  .empty{color:var(--muted);text-align:center;padding:60px 20px}
  .empty .big{font-size:38px;margin-bottom:8px}
  .loading{text-align:center;padding:80px 20px;color:var(--muted)}
  .spin{display:inline-block;width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite;margin-bottom:12px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:10px 20px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .loadmore{display:block;margin:22px auto;padding:10px 26px}
  .exportsheet{display:none}
  @media print{
    body *{visibility:hidden}
    .exportsheet,.exportsheet *{visibility:visible}
    .exportsheet{display:block;position:absolute;inset:0;padding:26px;background:#fff}
  }
  .exportsheet h1{font-size:23px;margin:0 0 2px}
  .exportsheet .esub{color:#666;font-size:13px;margin-bottom:16px}
  .exportsheet .roomhead{font-size:15px;font-weight:800;margin:18px 0 8px;color:#8f3f2c}
  .exportsheet .eitem{display:flex;gap:14px;border-bottom:1px solid #eee;padding:10px 0;align-items:center;break-inside:avoid}
  .exportsheet .eitem img{width:86px;height:86px;object-fit:cover;border-radius:6px}
  .exportsheet .eitem .et{font-weight:700}
  .exportsheet .eitem .ev{color:#666;font-size:12px}
  .exportsheet .eitem .ep{margin-left:auto;font-weight:700;white-space:nowrap}
  /* projects: room grouping */
  .roomgroup{margin-bottom:22px}
  .roomtitle{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid var(--brand-soft);padding-bottom:5px;margin-bottom:10px}
  .roomtitle span:first-child{font-weight:800;font-size:15px;letter-spacing:-.01em}
  .roomtitle .roomsub{font-size:12.5px;color:var(--muted);font-weight:600}
  select.roomIn{width:120px;padding:5px 6px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:12px}
  /* client portal / presentation */
  .cv-bar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .clientportal{max-width:1000px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:40px 44px 48px}
  .cv-head{text-align:center;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:28px}
  .cv-studio{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--brand);font-weight:700}
  .cv-head h1{font-size:30px;margin:8px 0 4px;letter-spacing:-.02em;font-weight:800}
  .cv-client{font-size:14px;color:var(--muted)}
  .cv-meta{font-size:12.5px;color:var(--muted);margin-top:6px}
  .cv-room{margin-bottom:34px;break-inside:avoid}
  .cv-roomhead{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--brand-soft);padding-bottom:6px;margin-bottom:16px}
  .cv-roomhead h2{font-size:18px;margin:0;font-weight:700;color:var(--brand-dark)}
  .cv-roomhead .cv-sub{font-size:13px;color:var(--muted);font-weight:600}
  .cv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:20px}
  .cv-card{margin:0}
  .cv-card img,.cv-card .cv-noimg{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:10px;background:var(--chip);display:block}
  .cv-card figcaption{padding:8px 2px 0}
  .cv-name{font-weight:600;font-size:13.5px;line-height:1.3}
  .cv-vn{font-size:11.5px;color:var(--muted);margin-top:1px}
  .cv-price{font-size:13px;font-weight:700;margin-top:3px}
  @media(max-width:760px){.rail{display:none}.main{padding:14px 12px 90px}.clientportal{padding:24px 18px}}
  @media print{
    .no-print{display:none!important}
    .clientportal{border:none;max-width:100%;padding:0}
    .clientportal,.clientportal *{visibility:visible}
    .topbar,.rail,.no-print{display:none!important}
    .exportsheet:empty{display:none!important}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Sourcing<span> · Katelyn</span></div>
  <div class="tabs">
    <button class="tab active" data-view="products" onclick="go('products')">Products</button>
    <button class="tab" data-view="vendors" onclick="go('vendors')">Vendors</button>
    <button class="tab" data-view="boards" onclick="go('boards')">Projects</button>
  </div>
  <div class="spacer"></div>
  <div class="count" id="topCount"></div>
</div>

<div class="shell">
  <aside class="rail" id="rail" style="display:none">
    <input class="search" id="q" placeholder="Search everything…" oninput="debounceRender()">
    <div id="railDepts"></div>
    <div id="railFilters">
      <h4>Price</h4>
      <div class="pricerow">
        <input type="number" id="pMin" placeholder="$ min" oninput="debounceRender()">
        <input type="number" id="pMax" placeholder="$ max" oninput="debounceRender()">
      </div>
      <h4>Design style</h4><div id="fStyle"></div>
      <h4>Era</h4><div id="fEra"></div>
      <h4>Color</h4><div id="fColor"></div>
      <h4>Size</h4><div id="fSize"></div>
      <h4>Region · shipping</h4><div id="fRegion"></div>
      <div style="margin-top:6px"><span class="fchip" style="background:var(--brand-soft);color:var(--brand-dark);font-weight:600" onclick="presetVintageLA()">★ Vintage · Los Angeles</span></div>
      <h4>Vendors</h4>
      <input class="search" id="qVendor" placeholder="Search vendors…" oninput="debounceRender()">
      <div id="fVendorSel" style="margin-top:6px"></div>
      <h4>Vendor type</h4>
      <div id="fVendorTags"></div>
      <h4>More</h4><div id="fMore"></div>
      <button class="clearbtn" onclick="clearFilters()">Clear all filters</button>
    </div>
  </aside>
  <main class="main" id="main"><div class="loading"><div class="spin"></div><br>Loading…</div></main>
</div>

<div id="modalHost"></div>
<div class="toast" id="toast"></div>
<div class="exportsheet" id="exportsheet"></div>

<script>
const BUILD='1783294376';
let VENDORS=[], VBYID={}, TRADE={}, MANIFEST=null, KEY=null;
const CHUNKS={};            // dept -> array of products (decrypted)
let LOADING_DEPT=null;
const S={view:'products', dept:null, sub:null, region:new Set(), vcats:new Set(), more:new Set(),
  style:new Set(), era:new Set(), color:new Set(), size:new Set(), vsel:new Set(), sort:'rel', shown:120, activeBoard:null, clientView:false};
function togVendor(vid){ S.vsel.has(vid)?S.vsel.delete(vid):S.vsel.add(vid); S.shown=120; render(); }
const STYLE_LIST=['Mid-Century Modern','Scandinavian','Japandi / Japanese','Art Deco','Industrial','Bohemian','Traditional','Rustic / Farmhouse','Coastal','Minimalist','Postmodern / Memphis','Brutalist','Organic Modern','French','Hollywood Regency','Bauhaus / Modernist'];
const ERA_LIST=['Antique (pre-1920)','1920s–40s','Mid-Century (1950s–70s)','1980s–90s','Vintage (general)'];
const COLOR_LIST=['White','Cream / Ivory','Beige / Tan','Brown / Wood','Black','Gray','Green','Blue','Red / Burgundy','Pink / Blush','Orange / Rust','Yellow / Gold','Brass / Bronze','Silver / Chrome','Copper','Purple','Multicolor'];
const SIZE_LIST=['3x5 & smaller','4x6','5x8','6x9','8x10','9x12','10x14 & larger','Runner','Round','Small (<24\")','Medium (24–48\")','Large (48–84\")','Extra Large (84\"+)'];
const LS='sourcingSite.v1';
let DB=(()=>{try{const d=JSON.parse(localStorage.getItem(LS)); if(d&&d.boards)return d;}catch(e){} return {boards:[], studio:'Hinden Studios'};})();
DB.boards.forEach(b=>{ if(!('client'in b))b.client=''; if(!Array.isArray(b.rooms))b.rooms=[...new Set((b.items||[]).map(i=>i.room).filter(Boolean))]; if(!('showPrices'in b))b.showPrices=true; });
function save(){localStorage.setItem(LS,JSON.stringify(DB));}
function uid(){return Math.random().toString(36).slice(2,10);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),1900);}
function money(n){return n==null?'—':'$'+Number(n).toLocaleString(undefined,{maximumFractionDigits:0});}
const REGIONS=['Los Angeles','California (other)','US West','US East','US South','US Midwest','US (other)','UK','Europe','International'];
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));

/* ---------- crypto ---------- */
async function deriveKey(pass,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function decryptWith(key,blob){
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(blob.iv)},key,b64(blob.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
function gateHTML(msg){
  return `<div style="max-width:340px;margin:12vh auto;text-align:center">
    <div style="font-size:40px;margin-bottom:10px">🔒</div>
    <h2 style="margin:0 0 6px">Private tool</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 16px">${msg||'Enter your passcode to unlock the catalog.'}</p>
    <input class="search" type="password" id="gatePass" placeholder="Passcode" style="text-align:center;font-size:16px" onkeydown="if(event.key==='Enter')tryUnlock()">
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="tryUnlock()">Unlock</button>
  </div>`;
}
async function unlockWith(pass){
  const cb=await fetch('data/catalog.enc.json?b='+BUILD).then(r=>r.json());
  const key=await deriveKey(pass,b64(cb.salt));
  const cat=await decryptWith(key,cb);   // throws on wrong pass
  KEY=key;
  VENDORS=cat.vendors; TRADE=cat.trade||{}; MANIFEST=cat.depts;
  VENDORS.forEach(v=>VBYID[v.id]=v);
  localStorage.setItem('sourcingSite.pass',pass);
  document.getElementById('rail').style.display='';
  render();
}
async function tryUnlock(){
  const pass=document.getElementById('gatePass').value; if(!pass)return;
  document.getElementById('main').innerHTML='<div class="loading"><div class="spin"></div><br>Decrypting…</div>';
  try{ await unlockWith(pass); }
  catch(e){ document.getElementById('main').innerHTML=gateHTML('Wrong passcode — try again.'); }
}
async function boot(){
  const saved=localStorage.getItem('sourcingSite.pass');
  if(saved){ try{ await unlockWith(saved); return; }catch(e){ localStorage.removeItem('sourcingSite.pass'); } }
  document.getElementById('main').innerHTML=gateHTML();
}
boot();

/* ---------- chunk loading ---------- */
async function loadDept(dept){
  if(CHUNKS[dept])return CHUNKS[dept];
  const meta=MANIFEST[dept]; if(!meta)return [];
  const files=meta.files||[meta.file];
  const parts=await Promise.all(files.map(f=>fetch('data/'+f+'?b='+BUILD).then(r=>r.json()).then(b=>decryptWith(KEY,b))));
  const prods=parts.flat();
  prods.forEach(p=>{const v=VBYID[p.v]; p._region=v?v.region:null;});
  CHUNKS[dept]=prods;
  return prods;
}
async function ensureDept(dept){
  if(CHUNKS[dept])return;
  LOADING_DEPT=dept;
  document.getElementById('main').innerHTML='<div class="loading"><div class="spin"></div><br>Loading '+esc(dept)+'…</div>';
  await loadDept(dept);
  LOADING_DEPT=null;
  render();
}
async function ensureAll(){
  const missing=Object.keys(MANIFEST).filter(d=>!CHUNKS[d]);
  if(!missing.length)return;
  document.getElementById('main').innerHTML='<div class="loading"><div class="spin"></div><br>Loading full catalog for search…</div>';
  await Promise.all(missing.map(loadDept));
  render();
}

/* ---------- filters ---------- */
let _deb;
function debounceRender(){clearTimeout(_deb);_deb=setTimeout(()=>{S.shown=120;
  const q=document.getElementById('q').value.trim();
  if(q&&S.view==='products'&&!S.dept){ensureAll().then(render);}else{render();}
},250);}
function chipRow(el,list,set,counts){
  el.innerHTML=list.map(x=>{
    const n=counts?`<span class="n">${counts[x]||0}</span>`:'';
    return `<span class="fchip ${set.has(x)?'on':''}" data-v="${esc(x)}">${esc(x)}${n}</span>`;
  }).join('');
  el.querySelectorAll('.fchip').forEach(c=>c.onclick=()=>{
    const v=c.dataset.v;
    const map={fRegion:S.region,fVendorTags:S.vcats,fMore:S.more,fStyle:S.style,fEra:S.era,fColor:S.color,fSize:S.size};
    const s=map[el.id]||S.more;
    s.has(v)?s.delete(v):s.add(v); S.shown=120; render();
  });
}
function clearFilters(){
  S.region.clear(); S.vcats.clear(); S.more.clear(); S.sub=null;
  S.style.clear(); S.era.clear(); S.color.clear(); S.size.clear(); S.vsel.clear();
  ['q','qVendor','pMin','pMax'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  S.shown=120; render();
}
function presetVintageLA(){
  clearFilters(); S.dept=null;
  S.vcats.add('Antiques & Vintage'); S.vcats.add('Marketplace & Resale');
  S.region.add('Los Angeles');
  go('vendors');
}
function vendorMatchesTags(v){ return !S.vcats.size || v.categories.some(c=>S.vcats.has(c)); }
function currentProducts(){
  let pool=[];
  if(S.dept){ pool=CHUNKS[S.dept]||[]; }
  else{ pool=Object.values(CHUNKS).flat(); }
  const q=document.getElementById('q').value.trim().toLowerCase();
  const qv=document.getElementById('qVendor').value.trim().toLowerCase();
  const mn=parseFloat(document.getElementById('pMin').value)||null;
  const mx=parseFloat(document.getElementById('pMax').value)||null;
  return pool.filter(p=>{
    if(S.sub&&p.c[1]!==S.sub)return false;
    if(S.vsel.size&&!S.vsel.has(p.v))return false;
    if(S.style.size&&!(p.sty||[]).some(x=>S.style.has(x)))return false;
    if(S.era.size&&!S.era.has(p.era))return false;
    if(S.color.size&&!(p.col||[]).some(x=>S.color.has(x)))return false;
    if(S.size.size&&!S.size.has(p.sz))return false;
    if(S.region.size&&!S.region.has(p._region))return false;
    if(S.vcats.size){const v=VBYID[p.v]; if(!v||!v.categories.some(c=>S.vcats.has(c)))return false;}
    if(S.more.has('In stock only')&&!p.a)return false;
    if(S.more.has('Has price')&&p.p==null)return false;
    if(mn!=null&&(p.p==null||p.p<mn))return false;
    if(mx!=null&&(p.p==null||p.p>mx))return false;
    if(q){const hay=(p.t+' '+p.vn+' '+p.ty).toLowerCase(); if(!hay.includes(q))return false;}
    return true;
  });
}
function filteredVendors(){
  const q=(document.getElementById('q')?.value||'').trim().toLowerCase();
  const qv=(document.getElementById('qVendor')?.value||'').trim().toLowerCase();
  return VENDORS.filter(v=>{
    if(S.vcats.size&&!v.categories.some(c=>S.vcats.has(c)))return false;
    if(S.region.size&&!S.region.has(v.region))return false;
    if(qv&&!v.name.toLowerCase().includes(qv))return false;
    if(q){const hay=(v.name+' '+(v.location||'')+' '+(v.notes||'')+' '+v.categories.join(' ')).toLowerCase(); if(!hay.includes(q))return false;}
    return true;
  });
}

/* ---------- routing / render ---------- */
function go(view){S.view=view;S.shown=120;if(view!=='boards')S.clientView=false;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));
  document.getElementById('rail').style.display=(view==='boards')?'none':'';
  render();
}
async function openDept(dept){S.dept=dept;S.sub=null;S.shown=120;await ensureDept(dept);render();}
function openSub(sub){S.sub=(S.sub===sub?null:sub);S.shown=120;render();}
function backToDepts(){S.dept=null;S.sub=null;render();}

function render(){
  if(!MANIFEST)return;
  if(LOADING_DEPT)return;
  // rail: departments
  const rd=document.getElementById('railDepts');
  const totalAll=Object.values(MANIFEST).reduce((s,m)=>s+m.total,0);
  rd.innerHTML='<h4>Departments</h4>'+
    `<div class="deptlink ${!S.dept&&S.view==='products'?'on':''}" onclick="go('products');backToDepts()"><span>All products</span><span class="n">${totalAll.toLocaleString()}</span></div>`+
    Object.entries(MANIFEST).sort((a,b)=>b[1].total-a[1].total).map(([d,m])=>
      `<div class="deptlink ${S.dept===d?'on':''}" onclick="go('products');openDept('${esc(d).replace(/'/g,"\\'")}')"><span>${esc(d)}</span><span class="n">${m.total.toLocaleString()}</span></div>`).join('');
  // rail filters
  const baseV=filteredVendors();
  const regCounts={};
  if(S.view==='vendors'){ baseV.forEach(v=>{if(v.region)regCounts[v.region]=(regCounts[v.region]||0)+1;}); }
  else{ currentProducts().forEach(p=>{if(p._region)regCounts[p._region]=(regCounts[p._region]||0)+1;}); }
  chipRow(document.getElementById('fRegion'),REGIONS,S.region,regCounts);
  // facet counts from currently visible products
  const pool=S.view==='products'?currentProducts():[];
  const fc={sty:{},era:{},col:{},sz:{}};
  pool.forEach(p=>{
    (p.sty||[]).forEach(x=>fc.sty[x]=(fc.sty[x]||0)+1);
    if(p.era)fc.era[p.era]=(fc.era[p.era]||0)+1;
    (p.col||[]).forEach(x=>fc.col[x]=(fc.col[x]||0)+1);
    if(p.sz)fc.sz[p.sz]=(fc.sz[p.sz]||0)+1;
  });
  const withCounts=(list,counts,sel)=>list.filter(x=>counts[x]||sel.has(x));
  // vendor multi-select: top vendors in current pool, plus any selected; searchable via qVendor
  const vCount={};
  pool.forEach(p=>vCount[p.v]=(vCount[p.v]||0)+1);
  const qv=(document.getElementById('qVendor')?.value||'').trim().toLowerCase();
  let vlist=Object.entries(vCount).sort((a,b)=>b[1]-a[1]).map(([vid])=>vid);
  if(qv) vlist=vlist.filter(vid=>(VBYID[vid]?.name||'').toLowerCase().includes(qv));
  const shown=new Set([...S.vsel, ...vlist.slice(0, qv?40:15)]);
  document.getElementById('fVendorSel').innerHTML=[...shown].map(vid=>{
    const v=VBYID[vid]; if(!v)return '';
    return `<span class="fchip ${S.vsel.has(vid)?'on':''}" onclick="togVendor('${vid}')">${esc(v.name.slice(0,28))}<span class="n">${vCount[vid]||0}</span></span>`;
  }).join('')+(vlist.length>15&&!qv?`<div style="font-size:11px;color:var(--muted);margin-top:3px">Top 15 shown — type to search all ${vlist.length}</div>`:'');
  chipRow(document.getElementById('fStyle'),withCounts(STYLE_LIST,fc.sty,S.style),S.style,fc.sty);
  chipRow(document.getElementById('fEra'),withCounts(ERA_LIST,fc.era,S.era),S.era,fc.era);
  chipRow(document.getElementById('fColor'),withCounts(COLOR_LIST,fc.col,S.color),S.color,fc.col);
  chipRow(document.getElementById('fSize'),withCounts(SIZE_LIST,fc.sz,S.size),S.size,fc.sz);
  const allTags=[...new Set(VENDORS.flatMap(v=>v.categories))].sort();
  chipRow(document.getElementById('fVendorTags'),allTags,S.vcats);
  chipRow(document.getElementById('fMore'),['In stock only','Has price'],S.more);
  document.getElementById('topCount').textContent=`${totalAll.toLocaleString()} products · ${VENDORS.length.toLocaleString()} vendors`;
  const m=document.getElementById('main');
  if(S.view==='products'){ S.dept?renderDeptPage(m):renderLanding(m); }
  else if(S.view==='vendors') renderVendors(m,baseV);
  else renderBoards(m);
}

function renderLanding(m){
  const q=document.getElementById('q').value.trim();
  if((q||S.vsel.size)&&Object.keys(CHUNKS).length===Object.keys(MANIFEST).length){
    const title=q?`Search: “${esc(q)}”`:[...S.vsel].map(v=>esc(VBYID[v]?.name||'')).join(' + ');
    return renderGrid(m,currentProducts(),title,'');
  }
  m.innerHTML=`
    <h1 class="pagetitle">Departments</h1>
    <div class="crumb">Every item for sale across all your vendors, sorted into pages.</div>
    <div class="dgrid">
      ${Object.entries(MANIFEST).sort((a,b)=>b[1].total-a[1].total).map(([d,meta])=>`
        <div class="dtile" onclick="openDept('${esc(d).replace(/'/g,"\\'")}')">
          <h3>${esc(d)}</h3>
          <div class="dn">${meta.total.toLocaleString()} items</div>
          <div class="subs">${Object.entries(meta.subs).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([s,n])=>`${esc(s)} (${n})`).join(' · ')}</div>
        </div>`).join('')}

}
function renderDeptPage(m){
  const meta=MANIFEST[S.dept];
  const list=sortProducts(currentProducts());
  const subs=Object.entries(meta.subs).sort((a,b)=>b[1]-a[1]);
  m.innerHTML=`
    <div class="crumb"><a onclick="backToDepts()">Departments</a> / ${esc(S.dept)}${S.sub?` / ${esc(S.sub)}`:''}</div>
    <h1 class="pagetitle">${esc(S.sub||S.dept)}</h1>
    <div class="subrow">${subs.map(([s,n])=>`<span class="fchip ${S.sub===s?'on':''}" onclick="openSub('${esc(s).replace(/'/g,"\\'")}')">${esc(s)}<span class="n">${n}</span></span>`).join('')}</div>
    ${gridHTML(list)}`;
}
function renderGrid(m,list,title,crumb){
  list=sortProducts(list);
  m.innerHTML=`${crumb}<h1 class="pagetitle">${title}</h1>${gridHTML(list)}`;
}
function gridHTML(list){
  const slice=list.slice(0,S.shown);
  return `
    <div class="toolrow">
      <span class="res"><strong>${list.length.toLocaleString()}</strong> items from <strong>${new Set(list.map(p=>p.v)).size}</strong> vendors</span>
      <select onchange="S.sort=this.value;render()">
        <option value="rel" ${S.sort==='rel'?'selected':''}>Sort: Default</option>
        <option value="priceAsc" ${S.sort==='priceAsc'?'selected':''}>Price ↑</option>
        <option value="priceDesc" ${S.sort==='priceDesc'?'selected':''}>Price ↓</option>
        <option value="name" ${S.sort==='name'?'selected':''}>Name</option>
        <option value="vendor" ${S.sort==='vendor'?'selected':''}>Vendor</option>
      </select>
    </div>
    <div class="pgrid">${slice.map(pcard).join('')}</div>
    ${list.length>S.shown?`<button class="btn loadmore" onclick="S.shown+=120;render()">Show more (${(list.length-S.shown).toLocaleString()} left)</button>`:''}
    ${list.length===0?'<div class="empty"><div class="big">🔍</div>Nothing here — loosen a filter.</div>':''}`;
}
function sortProducts(list){
  const s=S.sort,c=[...list];
  if(s==='priceAsc')c.sort((a,b)=>(a.p??1e12)-(b.p??1e12));
  if(s==='priceDesc')c.sort((a,b)=>(b.p??-1)-(a.p??-1));
  if(s==='name')c.sort((a,b)=>a.t.localeCompare(b.t));
  if(s==='vendor')c.sort((a,b)=>a.vn.localeCompare(b.vn));
  return c;
}
function pcard(p){
  return `<div class="pcard">
    ${p.img?`<img class="pimg" loading="lazy" src="${esc(p.img)}" alt="">`:`<div class="pimg"></div>`}
    <div class="pbody">
      <div class="ptitle">${esc(p.t)}</div>
      <div class="pvendor" style="cursor:pointer" title="Filter to this vendor" onclick="togVendor('${p.v}')">${esc(p.vn)} ${S.vsel.has(p.v)?'✓':''}</div>
      <div class="pprice">${money(p.p)} ${!p.a?'<span class="soldout">· sold out</span>':''}</div>
      <div class="pfoot">
        <button class="mini primary" onclick="addProductToBoard('${p.id}')">+ Project</button>
        <a class="mini" href="${esc(p.u)}" target="_blank" rel="noopener">View ↗</a>
      </div>
    </div>
  </div>`;
}

function renderVendors(m,base){
  const list=[...base].sort((a,b)=>a.name.localeCompare(b.name));
  m.innerHTML=`
    <div class="toolrow"><span class="res"><strong>${list.length.toLocaleString()}</strong> vendors · trade info in amber (never in exports)</span></div>

      ${list.map(v=>{

          ${t?`<div class="tradebox">${t.rep?`<b>${esc(t.rep)}</b><br>`:''}${t.email?`<a href="mailto:${esc(t.email)}">${esc(t.email)}</a><br>`:''}${t.phone?`${esc(t.phone)}<br>`:''}${t.disc!=null?`Trade: ${t.disc}% off`:''}</div>`:''}
          <div class="pfoot">

/* ---------- projects (client → rooms → items) ---------- */
function boardById(id){return DB.boards.find(b=>b.id===id);}
function activeBoard(){if(S.activeBoard&&boardById(S.activeBoard))return boardById(S.activeBoard);return DB.boards[0]||null;}
function newBoard(){
  const name=prompt('Project name:',''); if(!name)return null;
  const client=prompt('Client name (shown on the client portal):','')||'';
  const budget=parseFloat(prompt('Budget target (optional, $):','')||'')||null;
  const b={id:uid(),name,client,budget,rooms:[],showPrices:true,items:[]}; DB.boards.push(b); S.activeBoard=b.id; save(); render(); return b;
}
function findProduct(pid){
  for(const arr of Object.values(CHUNKS)){const p=arr.find(x=>x.id===pid); if(p)return p;}
  return null;
}
function addProductToBoard(pid){
  let b=activeBoard(); if(!b){b=newBoard(); if(!b)return;}
  const p=findProduct(pid); if(!p)return;
  const room=b.rooms.length===1?b.rooms[0]:'';
  b.items.push({id:uid(),kind:'product',refId:pid,name:p.t,vendorName:p.vn,img:p.img,room,price:p.p,status:'Considering',url:p.u,note:''});
  save(); toast(`Added → ${b.name}`); if(S.view==='boards')render();
}
function addVendorToBoard(vid){
  let b=activeBoard(); if(!b){b=newBoard(); if(!b)return;}
  const v=VBYID[vid]; if(!v)return;
  b.items.push({id:uid(),kind:'vendor',refId:vid,name:v.name,vendorName:v.name,img:'',room:'',price:null,status:'Considering',url:v.url||'',note:'(vendor — pick item)'});
  save(); toast(`Added ${v.name} → ${b.name}`); if(S.view==='boards')render();
}
function addRoom(){const b=activeBoard();if(!b)return;const n=prompt('Room name (e.g. Living Room, Primary Bedroom):','');if(!n)return;if(!b.rooms.includes(n))b.rooms.push(n);save();render();}
function projRooms(b){ // ordered room list = declared rooms + any used-but-undeclared, then Unassigned
  const used=[...new Set(b.items.map(i=>i.room).filter(Boolean))];
  const ordered=[...b.rooms]; used.forEach(r=>{if(!ordered.includes(r))ordered.push(r);});
  return ordered;
}
function renderBoards(m){
  const b=activeBoard();
  if(b&&S.clientView) return renderClientView(m,b);
  const opts=DB.boards.map(x=>`<option value="${x.id}" ${b&&x.id===b.id?'selected':''}>${esc(x.name)}${x.client?` — ${esc(x.client)}`:''}</option>`).join('');
  const total=b?b.items.reduce((s,i)=>s+(i.price||0),0):0;
  const over=b&&b.budget&&total>b.budget;
  m.innerHTML=`
    <div class="boardbar">
      <select class="boardsel" onchange="S.activeBoard=this.value;render()">${opts||'<option>No projects yet</option>'}</select>
      <button class="btn" onclick="newBoard()">+ New project</button>
      ${b?`<button class="btn" onclick="addRoom()">+ Room</button>
      <button class="btn" onclick="renameBoard()">Edit</button>
      <button class="btn danger" onclick="deleteBoard()">Delete</button>
      <button class="btn" onclick="exportClipList()">Clip list</button>
      <button class="btn" onclick="exportSpec()">Spec sheet</button>
      <button class="btn primary" onclick="S.clientView=true;render()">👁 Client view</button>`:''}
      ${b?`<div class="budgetbox"><div class="big ${over?'over':''}">${money(total)}</div>
        <div class="${over?'over':''}">${b.budget?`of ${money(b.budget)} target${over?' — OVER':''}`:'no target set'}</div></div>`:''}
    </div>
    ${!b?`<div class="empty"><div class="big">📋</div>No projects yet — hit <b>+ New project</b>.</div>`
    : b.items.length===0?`<div class="empty"><div class="big">🕳️</div>Empty project. Browse <b>Products</b> and hit <b>+ Project</b> on anything good.</div>`
    : roomGroupsHTML(b)}`;
}
function roomGroupsHTML(b){
  const rooms=projRooms(b);
  const groups=[...rooms,'Unassigned'];
  return groups.map(room=>{
    const items=b.items.filter(i=>(i.room||'Unassigned')===room || (room==='Unassigned'&&!i.room));
    if(!items.length) return '';
    const sub=items.reduce((s,i)=>s+(i.price||0),0);
    return `<div class="roomgroup">
      <div class="roomtitle"><span>${esc(room)}</span><span class="roomsub">${items.length} item${items.length>1?'s':''} · ${money(sub)}</span></div>
      ${items.map(i=>bitem(i,b)).join('')}
    </div>`;
  }).join('') || b.items.map(i=>bitem(i,b)).join('');
}
function bitem(i,b){
  const rooms=projRooms(b);
  const roomOpts=['<option value="">— room —</option>',...rooms.map(r=>`<option value="${esc(r)}" ${i.room===r?'selected':''}>${esc(r)}</option>`)].join('');
  return `<div class="bitem">
    ${i.img?`<img loading="lazy" src="${esc(i.img)}">`:`<div style="width:64px;height:64px;border-radius:8px;background:var(--chip)"></div>`}
    <div class="binfo">
      <div class="bname">${esc(i.name)}</div>
      <div class="bvendor">${esc(i.vendorName)} ${i.url?` · <a href="${esc(i.url)}" target="_blank" rel="noopener">view ↗</a>`:''}</div>
      <input type="text" placeholder="note for client (what/where)…" value="${esc(i.note)}" style="width:100%;margin-top:4px;padding:4px 8px;border:1px solid var(--line);border-radius:7px;font-size:12px" onchange="editItem('${i.id}','note',this.value)">
    </div>
    <select class="roomIn" onchange="setRoom('${i.id}',this.value)">${roomOpts}</select>
    <input class="priceIn" type="number" placeholder="$" value="${i.price!=null?i.price:''}" onchange="editItem('${i.id}','price',parseFloat(this.value)||null)">
    <button class="status ${i.status}" onclick="cycleStatus('${i.id}')">${i.status}</button>
    <button class="mini" onclick="removeItem('${i.id}')">✕</button>
  </div>`;
}
function setRoom(id,v){const b=activeBoard();const i=b.items.find(x=>x.id===id);if(i){i.room=v;if(v&&!b.rooms.includes(v))b.rooms.push(v);save();render();}}
function editItem(id,k,v){const b=activeBoard();const i=b.items.find(x=>x.id===id);if(i){i[k]=v;save();if(k==='price')render();}}
function cycleStatus(id){const o=['Considering','Specified','Ordered'];const b=activeBoard();const i=b.items.find(x=>x.id===id);i.status=o[(o.indexOf(i.status)+1)%3];save();render();}
function removeItem(id){const b=activeBoard();b.items=b.items.filter(x=>x.id!==id);save();render();}
function renameBoard(){const b=activeBoard();if(!b)return;
  const n=prompt('Project name:',b.name);if(n)b.name=n;
  const c=prompt('Client name (shown on client portal):',b.client||'');if(c!==null)b.client=c;
  const bud=prompt('Budget target ($, blank for none):',b.budget||'');b.budget=parseFloat(bud)||null;
  b.showPrices=confirm('Show prices to the client on the portal?  OK = show · Cancel = hide');
  save();render();}
function deleteBoard(){const b=activeBoard();if(!b)return;if(!confirm(`Delete "${b.name}"?`))return;
  DB.boards=DB.boards.filter(x=>x.id!==b.id);S.activeBoard=null;save();render();}

/* ---------- client portal / presentation ---------- */
function renderClientView(m,b){
  const rooms=projRooms(b);
  const groups=[...rooms,'Unassigned'];

    const items=b.items.filter(i=>(i.room||'Unassigned')===room||(room==='Unassigned'&&!i.room));
    if(!items.length)return '';
    const sub=items.reduce((s,i)=>s+(i.price||0),0);
    return `<section class="cv-room">
      <div class="cv-roomhead"><h2>${esc(room)}</h2>${b.showPrices?`<span class="cv-sub">${money(sub)}</span>`:''}</div>
      <div class="cv-grid">
        ${items.map(i=>`<figure class="cv-card">
          ${i.img?`<img loading="lazy" src="${esc(i.img)}" alt="">`:`<div class="cv-noimg"></div>`}
          <figcaption>
            <div class="cv-name">${esc(i.note&&i.note!=='(vendor — pick item)'?i.note:i.name)}</div>
            <div class="cv-vn">${esc(i.vendorName)}</div>

          </figcaption>
        </figure>`).join('')}
      </div>
    </section>`;
  }).join('');

    <div class="cv-bar no-print">
      <button class="btn" onclick="S.clientView=false;render()">← Back to editing</button>
      <span style="color:var(--muted);font-size:12.5px">Client-facing preview — trade info &amp; statuses hidden${b.showPrices?'':' · prices hidden'}</span>
      <button class="btn primary" style="margin-left:auto" onclick="window.print()">Print / Save PDF</button>
    </div>
    <div class="clientportal">
      <header class="cv-head">
        <div class="cv-studio">${esc(DB.studio||'')}</div>
        <h1>${esc(b.name)}</h1>
        ${b.client?`<div class="cv-client">Prepared for ${esc(b.client)}</div>`:''}
        <div class="cv-meta">${b.items.length} selections${b.showPrices?` · ${money(total)} total`:''}</div>
      </header>
      ${body||'<div class="empty">No items yet.</div>'}
    </div>`;
}
function exportClipList(){
  const b=activeBoard();if(!b)return;
  const urls=b.items.filter(i=>i.url).map(i=>`${i.name} — ${i.url}`);
  const no=b.items.filter(i=>!i.url).map(i=>i.name);
  let t=`CLIP LIST — ${b.name}\n${'='.repeat(30)}\n\n${urls.join('\n')}`;
  if(no.length)t+=`\n\nNo URL:\n${no.join('\n')}`;
  navigator.clipboard.writeText(t).then(()=>toast('Clip list copied'));
}
function exportSpec(){
  const b=activeBoard();if(!b)return;
  const rooms={};
  b.items.forEach(i=>{const r=i.room||'Unassigned';(rooms[r]=rooms[r]||[]).push(i);});
  const el=document.getElementById('exportsheet');
  el.innerHTML=`
    <h1>${esc(b.name)}</h1>
    <div class="esub">Specification · ${new Date().toLocaleDateString()} · ${b.items.length} items</div>
    ${Object.entries(rooms).map(([room,items])=>`
      <div class="roomhead">${esc(room)}</div>
      ${items.map(i=>`<div class="eitem">
        ${i.img?`<img src="${esc(i.img)}">`:''}
        <div><div class="et">${esc(i.note&&i.note!=='(vendor — pick item)'?i.note:i.name)}</div>
        <div class="ev">${esc(i.vendorName)} · ${i.status}</div></div>
        <div class="ep">${money(i.price)}</div>
      </div>`).join('')}`).join('')}
    <div style="text-align:right;font-weight:800;font-size:16px;margin-top:16px">Total: ${money(b.items.reduce((s,i)=>s+(i.price||0),0))}</div>`;
  window.print();
}
</script>
</body>
</html>
